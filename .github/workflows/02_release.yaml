name: 02 release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
      id-token: write
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a #v5.5.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Create settings.xml
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 #v4.0.0
        with:
          repositories: '[{"id": "xerces","name": "github","url": "https://maven.pkg.github.com/navikt/xerces-xmlschema-1.1"}]'
          servers: '[{{"id": "xerces", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]'

      - name: Configure git user
        run: |
          git config user.name "GitHub Actions Bot (${ACTOR})"
          git config user.email "actions@github.com"
        env:
          ACTOR: ${{ github.actor }}

      - name: Publish
        run: |
          mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: report to slack
        if: always()
        uses: navikt/eresept-actions/slack-notify@main
        with:
          status: "${{ job.status }}"
          username: "release ${{ env.appver }}"
          icon: ":github:"
          title-success: "Successfully released _*${{ github.event.repository.name }}*_"
          title-failure: "Release of _*${{ github.event.repository.name }}*_ failed"
          title-cancelled: "Release of _*${{ github.event.repository.name }}*_ was cancelled"
          message-success: "Successfully released _*${{ github.event.repository.name }}*_"
          webhook: ${{ secrets.SLACK_WEBHOOK }}
